<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>station-client browser demo</title>
    <link
      rel="shortcut icon"
      href="https://sovereignbase.dev/sovereignbase_logo.png"
      type="image/x-icon"
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        --bg: #060606;
        --panel: rgba(255, 255, 255, 0.05);
        --panel-strong: rgba(255, 255, 255, 0.08);
        --stroke: rgba(255, 255, 255, 0.14);
        --stroke-strong: rgba(255, 255, 255, 0.22);
        --text: #fff;
        --text-soft: rgba(255, 255, 255, 0.72);
        --accent: #97f0ff;
        --accent-soft: rgba(151, 240, 255, 0.16);
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 15% 20%,
            rgba(151, 240, 255, 0.16),
            transparent 28%
          ),
          radial-gradient(
            circle at 85% 0%,
            rgba(255, 214, 153, 0.12),
            transparent 24%
          ),
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.1),
            transparent 36%
          ),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(100%, 46rem);
        margin: 0 auto;
        padding: 1.25rem;
      }

      .shell {
        display: grid;
        gap: 1.5rem;
        padding: 1.4rem;
        border: 1px solid var(--stroke);
        border-radius: 1.5rem;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.03)
          ),
          rgba(255, 255, 255, 0.02);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.92;
        max-width: 12ch;
      }

      .lede {
        margin: 0;
        max-width: 34rem;
        color: var(--text-soft);
        line-height: 1.6;
      }

      .controls {
        display: grid;
        gap: 1rem;
      }

      label {
        display: grid;
        gap: 0.65rem;
        padding: 0.95rem 1rem;
        border: 1px solid var(--stroke);
        border-radius: 1rem;
        background: var(--panel);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-soft);
      }

      input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid var(--stroke);
        border-radius: 0.9rem;
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        letter-spacing: 0;
        text-transform: none;
        transition:
          border-color 160ms ease,
          background-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }

      input:hover {
        border-color: var(--stroke-strong);
        background: rgba(255, 255, 255, 0.06);
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 0.28rem var(--accent-soft);
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .toggle input {
        width: 1.35rem;
        height: 1.35rem;
        margin: 0;
        padding: 0;
        border-radius: 0.35rem;
        accent-color: var(--accent);
        box-shadow: none;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .links a,
      .spec-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border: 1px solid var(--stroke);
        border-radius: 1rem;
        background: var(--panel);
        color: var(--text);
        text-decoration: none;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background-color 160ms ease;
      }

      .links a:hover,
      .spec-link:hover {
        transform: translateY(-1px);
        border-color: var(--stroke-strong);
        background: var(--panel-strong);
      }

      .spec-link {
        width: fit-content;
      }

      .links a {
        font-weight: 600;
      }

      .links img {
        width: 1rem;
        height: 1rem;
        flex: 0 0 1rem;
      }

      @media (min-width: 40rem) {
        main {
          padding: 2rem;
        }

        .shell {
          padding: 1.9rem;
        }

        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toggle {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <p class="eyebrow">Browser Demo</p>
        <h1>A realtime client for sovereignbase</h1>
        <p class="lede">
          Open this page in another tab and edit either view. The form state
          stays in sync between tabs in real time.
        </p>

        <div class="controls">
          <label for="name">
            name
            <input id="name" type="text" placeholder="Ada Lovelace" />
          </label>

          <label for="amount">
            amount
            <input id="amount" type="number" placeholder="0" />
          </label>

          <label class="toggle" for="flag">
            <span>flag</span>
            <input id="flag" type="checkbox" />
          </label>
        </div>

        <nav class="links" aria-label="Project links">
          <a href="https://jsr.io/@sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/jsr/white" alt="" />
            jsr
          </a>
          <a href="https://www.npmjs.com/package/@sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/npm/white" alt="" />
            npm
          </a>
          <a href="https://github.com/sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/github/white" alt="" />
            GitHub
          </a>
        </nav>

        <a class="spec-link" href="/spec">read specification</a>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
