    <style>
      :root {
        color-scheme: dark;
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        background: #000;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.1),
            transparent 36%
          ),
          #000;
        color: #fff;
      }

      main {
        width: min(100%, 42rem);
        margin: 0 auto;
        padding: 1.25rem;
      }

      .shell {
        display: grid;
        gap: 1.25rem;
        padding: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.95;
      }

      .lede {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.6;
      }

      .controls {
        display: grid;
        gap: 1rem;
      }

      label {
        display: grid;
        gap: 0.55rem;
        font-size: 0.95rem;
      }

      input,
      a {
        border-radius: 999px;
      }

      input[type='text'],
      input[type='number'] {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #050505;
        color: #fff;
        font: inherit;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }

      input[type='text']:focus,
      input[type='number']:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.3);
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
      }

      .toggle input {
        width: 1.35rem;
        height: 1.35rem;
        margin: 0;
        accent-color: #fff;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .links a,
      .spec-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        min-height: 2.5rem;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        text-decoration: none;
      }

      .links a:hover,
      .spec-link:hover {
        border-color: rgba(255, 255, 255, 0.22);
      }

      .spec-link {
        width: fit-content;
      }

      .links a {
        font-weight: 600;
      }

      .links img {
        width: 1rem;
        height: 1rem;
        flex: 0 0 1rem;
      }

      @media (min-width: 40rem) {
        main {
          padding: 2rem;
        }

        .shell {
          padding: 1.75rem;
        }

        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toggle {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <nav class="links" aria-label="Project links">
          <a href="https://jsr.io/@sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/jsr/white" alt="" />
            jsr
          </a>
          <a href="https://www.npmjs.com/package/@sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/npm/white" alt="" />
            npm
          </a>
          <a href="https://github.com/sovereignbase/station-client">
            <img src="https://cdn.simpleicons.org/github/white" alt="" />
            GitHub
          </a>
        </nav>

        <h1>A realtime client for sovereignbase</h1>
        <p class="lede">
          Open this page in another tab and edit either view. The form state
          stays in sync between tabs in real time.
        </p>

        <div class="controls">
          <label for="name">
            name
            <input id="name" type="text" placeholder="Ada Lovelace" />
          </label>

          <label for="amount">
            amount
            <input id="amount" type="number" placeholder="0" />
          </label>

          <label class="toggle" for="flag">
            <span>flag</span>
            <input id="flag" type="checkbox" />
          </label>
        </div>

        <a
          class="spec-link"
          href="https://sovereignbase.dev/station-client/spec"
          >read specification</a
        >
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
